<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Miranda+Sans:ital,wght@0,400..700;1,400..700&display=swap"
      rel="stylesheet"
    />
    <title>The Forecast</title>
  </head>
  <body>
    <div class="weather-app">
      <header>
        <form>
          <input type="search" placeholder="Enter a city..." required />
          <input type="submit" value="Search" />
        </form>
      </header>

      <main>
        <div>
          <h1>London</h1>
          <p>
            Tuesday 14:49, scattered clouds
            <br />
            Humidity: 66%, Wind: 3.13km/h
          </p>
        </div>
        <div>🌤️ 12°C</div>
      </main>
      <footer>
        This project was coded by
        <a href="https://github.com/SukhpreetKs28" target="_blank">
          Sukhpreet Sandhu </a
        >, is
        <a href="https://github.com/SukhpreetKs28/theforecast" target="_blank">
          open-sourced on GitHub
        </a>
        and hosted on
        <a
          href="https://the-iridescent-forecast-app.netlify.app/"
          target="_blank"
        >
          Netlify
        </a>
      </footer>
    </div>
  </body>
</html>
